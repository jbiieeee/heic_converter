<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIC to JPEG/PNG Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>HEIC Converter</h1>
        <p>Convert your iPhone or Samsung (.heic / .heif) photos to JPEG or PNG instantly.</p>

        <div class="upload-area">
            <input type="file" id="heic-input" accept=".heic, .heif" />
        </div>

        <div class="controls">
            <label for="format-select">Convert to:</label>
            <select id="format-select">
                <option value="image/jpeg">JPEG</option>
                <option value="image/png">PNG</option>
            </select>
        </div>

        <button id="convert-btn" disabled>Convert Image</button>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Converting... this might take a few seconds.</p>
        </div>

        <div id="result-area" class="hidden">
            <h3>Converted Image:</h3>
            <img id="preview-img" alt="Converted Preview" />
            <a id="download-link" class="download-btn" download="converted_image.jpg">Download Image</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
